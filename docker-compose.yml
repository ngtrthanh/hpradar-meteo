services:
  hydro-api:
    image: ghcr.io/ngtrthanh/hpradar-meteo:latest
    build: .
    container_name: hydro-api
    restart: unless-stopped
    ports:
      - "8113:8000"
    environment:
      - DB_HOST=${DB_HOST:-100.100.40.89}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-mhdb}
      - DB_USER=${DB_USER:-ais_user}
      - DB_PASS=${DB_PASS:-RTL2838UHIDIR}
      - FETCH_SOURCES=${FETCH_SOURCES:-https://m3.hpradar.com/api/binmsgs.json|60,https://m4.hpradar.com/api/binmsgs.json|60,https://aisinfra.hpradar.com/api/binmsgs.json|90}
      - RETENTION_DAYS=${RETENTION_DAYS:-9000}
      - API_KEY=${API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    privileged: true
