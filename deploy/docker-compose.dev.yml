# Test — test-tide.hpradar.com
# Image tag: dev (from dev branch)

services:
  hydro-api:
    image: ghcr.io/ngtrthanh/hpradar-meteo:dev
    container_name: hydro-api-dev
    restart: unless-stopped
    ports:
      - "8113:8000"
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-dev
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      hydro-api:
        condition: service_healthy

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-dev
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 120 --cleanup hydro-api-dev
    # Checks every 2 min (faster for dev)
