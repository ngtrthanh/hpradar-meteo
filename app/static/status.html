<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        .header{text-align:center;margin-bottom:30px;color:#fff}
        .header h1{font-size:2.5rem;margin-bottom:10px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
        .nav-link{color:rgba(255,255,255,.8);text-decoration:none}.nav-link:hover{color:#fff}
        .status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:30px}
        .status-card{background:#fff;padding:25px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.1)}
        .status-card h3{margin-bottom:15px;color:#333}
        .status-item{display:flex;justify-content:space-between;align-items:center;margin:10px 0;padding:10px 0;border-bottom:1px solid #f0f0f0}
        .status-item:last-child{border-bottom:none}
        .status-value{font-weight:600}
        .status-ok{color:#22c55e}.status-error{color:#ef4444}
        .btn{background:linear-gradient(45deg,#667eea,#764ba2);color:#fff;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-weight:500;margin:5px}
        .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.4)}
        .logs-section{background:#fff;padding:20px;border-radius:12px;margin-top:20px;box-shadow:0 4px 15px rgba(0,0,0,.1)}
        .log-entry{font-family:'Courier New',monospace;font-size:12px;padding:5px 0;border-bottom:1px solid #f0f0f0}
        .log-info{color:#0066cc}.log-warning{color:#ff8800}.log-error{color:#cc0000}
        .source-list{font-size:.85rem;color:#555;margin-top:8px;word-break:break-all}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="/" class="nav-link">← Back to Dashboard</a>
        <h1>🔧 System Status</h1>
    </div>
    <div class="status-grid">
        <div class="status-card">
            <h3>🌐 Data Sources</h3>
            <div class="status-item"><span>Active Sources</span><span class="status-value" id="source-count">-</span></div>
            <div class="status-item"><span>Fetch Interval</span><span class="status-value" id="fetch-interval">-</span></div>
            <div id="source-list" class="source-list"></div>
            <button class="btn" onclick="triggerFetch()">🔄 Trigger Fetch</button>
        </div>
        <div class="status-card">
            <h3>🗄️ Database</h3>
            <div class="status-item"><span>Connection</span><span class="status-value" id="db-status">Checking...</span></div>
            <div class="status-item"><span>Total Stations</span><span class="status-value" id="total-stations">-</span></div>
            <div class="status-item"><span>Total Records</span><span class="status-value" id="total-records">-</span></div>
        </div>
        <div class="status-card">
            <h3>⚡ Performance</h3>
            <div class="status-item"><span>Poller</span><span class="status-value" id="poller-status">-</span></div>
            <div class="status-item"><span>Uptime</span><span class="status-value" id="uptime">-</span></div>
        </div>
    </div>
    <div class="logs-section"><h3>📝 Activity</h3><div id="activity-log"><div class="log-entry">Monitoring started...</div></div></div>
</div>
<script>
const start=Date.now();
function fmt(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),d=Math.floor(h/24);if(d>0)return d+'d '+h%24+'h';if(h>0)return h+'h '+m%60+'m';if(m>0)return m+'m '+s%60+'s';return s+'s'}
function log(lvl,msg){const el=document.getElementById('activity-log');const e=document.createElement('div');e.className='log-entry log-'+lvl;e.textContent=new Date().toLocaleTimeString()+' ['+lvl.toUpperCase()+'] '+msg;el.insertBefore(e,el.firstChild);while(el.children.length>50)el.removeChild(el.lastChild)}
async function update(){
    try{
        const[health,counts]=await Promise.all([fetch('/api/health').then(r=>r.json()),fetch('/api/counts').then(r=>r.json())]);
        document.getElementById('source-count').textContent=health.sources?health.sources.length:1;
        document.getElementById('fetch-interval').textContent=health.poll_interval+'s';
        if(health.sources){document.getElementById('source-list').innerHTML=health.sources.map(s=>'• '+s).join('<br>')}
        const db=health.db_pool==='connected';
        document.getElementById('db-status').innerHTML='<span class="'+(db?'status-ok':'status-error')+'">'+(db?'✓ Connected':'✗ Disconnected')+'</span>';
        document.getElementById('poller-status').innerHTML='<span class="'+(health.poller==='running'?'status-ok':'status-error')+'">'+(health.poller==='running'?'✓ Running':'✗ Stopped')+'</span>';
        document.getElementById('total-stations').textContent=counts.stations.toLocaleString();
        document.getElementById('total-records').textContent=(counts.meteo_observations+counts.hydro_observations).toLocaleString();
        document.getElementById('uptime').textContent=fmt(Date.now()-start);
        log('info','Status updated');
    }catch(e){log('error','Update failed: '+e.message)}
}
async function triggerFetch(){log('info','Manual fetch...');try{await fetch('/api/debug/fetch');log('info','Fetch done');setTimeout(update,2000)}catch(e){log('error','Fetch failed: '+e.message)}}
update();setInterval(update,30000);
</script>
</body>
</html>
