<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIS Data Browser</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f5f7fa}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:20px;text-align:center}
        .header h1{font-size:2rem;margin-bottom:10px}
        .nav-link{color:rgba(255,255,255,.8);text-decoration:none}.nav-link:hover{color:#fff}
        .container{max-width:1400px;margin:0 auto;padding:20px}
        .controls{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
        .control-row{display:flex;gap:15px;margin-bottom:15px;flex-wrap:wrap;align-items:center}
        .control-row label{font-weight:500}
        .control-row input,.control-row select{padding:8px 12px;border:1px solid #ddd;border-radius:6px}
        .btn{background:linear-gradient(45deg,#667eea,#764ba2);color:#fff;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-weight:500;margin-right:10px}
        .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.4)}
        .data-table{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1)}
        .table-header{background:#f8f9fa;padding:15px 20px;border-bottom:1px solid #e9ecef}
        .table-wrapper{overflow-x:auto;max-height:600px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #e9ecef}
        th{background:#f8f9fa;font-weight:600;position:sticky;top:0;z-index:10}
        tr:hover{background:#f8f9fa}
        .loading{text-align:center;padding:40px;color:#666}
        .no-data{text-align:center;padding:40px;color:#999}
        .export-section{margin-top:20px;text-align:center}
    </style>
</head>
<body>
<div class="header">
    <a href="/" class="nav-link">← Back to Dashboard</a>
    <h1>📈 Data Browser</h1>
</div>
<div class="container">
    <div class="controls">
        <h3>Filters</h3>
        <div class="control-row">
            <label>Type:</label>
            <select id="data-type"><option value="meteo">Meteorological</option><option value="hydro">Hydrographic</option><option value="stations">Stations</option></select>
            <label>Station:</label>
            <select id="station-select"><option value="">All</option></select>
            <label>Limit:</label>
            <select id="limit-filter"><option value="100">100</option><option value="500" selected>500</option><option value="1000">1000</option><option value="2000">2000</option></select>
            <label>From:</label><input type="datetime-local" id="start-input">
            <label>To:</label><input type="datetime-local" id="end-input">
            <button class="btn" onclick="loadData()">Load</button>
        </div>
    </div>
    <div class="data-table">
        <div class="table-header"><h3 id="table-title">Loading...</h3></div>
        <div class="table-wrapper"><div id="table-content" class="loading">Loading...</div></div>
    </div>
    <div class="export-section">
        <button class="btn" onclick="exportData('csv')">📄 Export CSV</button>
        <button class="btn" onclick="exportData('json')">📋 Export JSON</button>
    </div>
</div>
<script>
let currentData=[];

async function loadStations(){
    try{
        const stations=await fetch('/api/stations').then(r=>r.json());
        const sel=document.getElementById('station-select');
        stations.forEach(s=>{const o=document.createElement('option');o.value=s.mmsi;o.textContent=s.mmsi+' — '+(s.country||s.lat.toFixed(2)+','+s.lon.toFixed(2));sel.appendChild(o)});
    }catch(e){}
}

async function loadData(){
    const type=document.getElementById('data-type').value;
    const mmsi=document.getElementById('station-select').value;
    const limit=document.getElementById('limit-filter').value;
    const start=document.getElementById('start-input').value;
    const end=document.getElementById('end-input').value;
    document.getElementById('table-content').innerHTML='<div class="loading">Loading...</div>';
    try{
        let url='/api/'+type+'?limit='+limit;
        if(mmsi&&type!=='stations')url+='&mmsi='+mmsi;
        if(start)url+='&start='+new Date(start).toISOString();
        if(end)url+='&end='+new Date(end).toISOString();
        const data=await fetch(url).then(r=>r.json());
        currentData=data;
        document.getElementById('table-title').textContent=type.charAt(0).toUpperCase()+type.slice(1)+' ('+data.length+' records)';
        if(!data.length){document.getElementById('table-content').innerHTML='<div class="no-data">No data</div>';return}
        renderTable(data,type);
    }catch(e){document.getElementById('table-content').innerHTML='<div class="no-data">Error: '+e.message+'</div>'}
}

function renderTable(data,type){
    let headers,rows;
    if(type==='meteo'){headers=['MMSI','Timestamp','Wind Speed (m/s)','Wind Dir (°)'];rows=data.map(r=>[r.mmsi,new Date(r.ts).toLocaleString(),r.wspeed??'N/A',r.wdir??'N/A'])}
    else if(type==='hydro'){headers=['MMSI','Timestamp','Water Level (m)','Sea State'];rows=data.map(r=>[r.mmsi,new Date(r.ts).toLocaleString(),r.waterlevel??'N/A',r.seastate??'N/A'])}
    else{headers=['MMSI','DAC','FI','Lon','Lat','Country'];rows=data.map(r=>[r.mmsi,r.dac??'N/A',r.fi??'N/A',r.lon?.toFixed(6)??'N/A',r.lat?.toFixed(6)??'N/A',r.country??'N/A'])}
    document.getElementById('table-content').innerHTML='<table><thead><tr>'+headers.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
}

function exportData(fmt){
    if(!currentData.length){alert('No data');return}
    const type=document.getElementById('data-type').value;
    let content,mime,ext;
    if(fmt==='csv'){
        const h=Object.keys(currentData[0]);
        content='\uFEFF'+h.join(',')+'\n'+currentData.map(r=>h.map(k=>{const v=r[k];return v===null||v===undefined?'':'"'+v+'"'}).join(',')).join('\n');
        mime='text/csv;charset=utf-8';ext='csv';
    }else{content=JSON.stringify(currentData,null,2);mime='application/json';ext='json'}
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mime}));
    a.download='ais_'+type+'_'+new Date().toISOString().split('T')[0]+'.'+ext;a.click();
}

loadStations().then(loadData);
</script>
</body>
</html>
