<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIS Station Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:20px;text-align:center}
        .header h1{font-size:2rem;margin-bottom:10px}
        .nav-link{color:rgba(255,255,255,.8);text-decoration:none}.nav-link:hover{color:#fff}
        #map{height:calc(100vh - 100px);width:100%}
        .info-panel{position:absolute;top:10px;right:10px;background:#fff;padding:15px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1);z-index:1000;min-width:200px}
        .custom-station-icon{background:#fff;border:2px solid #667eea;border-radius:50%;text-align:center;line-height:16px;font-size:12px;box-shadow:0 2px 5px rgba(0,0,0,.2)}
        .custom-station-icon:hover{transform:scale(1.1);border-color:#764ba2}
    </style>
</head>
<body>
<div class="header">
    <a href="/" class="nav-link">← Back to Dashboard</a>
    <h1>🗺️ Weather Station Map</h1>
</div>
<div class="info-panel"><h4>📍 Stations</h4><div id="station-count">Loading...</div></div>
<div id="map"></div>
<script>
const map=L.map('map').setView([40,0],3);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(map);
const icon=L.divIcon({className:'custom-station-icon',html:'🌊',iconSize:[20,20],iconAnchor:[10,10]});
const layer=L.layerGroup().addTo(map);

async function load(){
    try{
        const stations=await fetch('/api/stations').then(r=>r.json());
        document.getElementById('station-count').innerHTML='<strong>'+stations.length+'</strong> stations';
        layer.clearLayers();
        const valid=stations.filter(s=>s.lat&&s.lon);
        valid.forEach(s=>{
            L.marker([s.lat,s.lon],{icon}).bindPopup(
                '<h3>🌊 '+s.mmsi+'</h3>'+
                '<div>Location: '+s.lat.toFixed(4)+', '+s.lon.toFixed(4)+'</div>'+
                (s.country?'<div>Country: '+s.country+'</div>':'')+
                '<hr><a href="/station?mmsi='+s.mmsi+'">📋 Details</a> | '+
                '<a href="/charts?mmsi='+s.mmsi+'">📊 Charts</a>'
            ).addTo(layer);
        });
        if(valid.length>0){
            const g=L.featureGroup(valid.map(s=>L.marker([s.lat,s.lon])));
            map.fitBounds(g.getBounds().pad(0.1));
        }
    }catch(e){document.getElementById('station-count').innerHTML='<span style="color:#ef4444">Error loading</span>'}
}
load();
</script>
</body>
</html>
