<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TIDE WATCH — Live Maritime Data</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div id="app">
  <nav class="nav">
    <div class="nav-brand"><span class="i">🌊</span><span class="t">TIDE WATCH</span></div>
    <div class="tb">
      <button class="tbtn on" id="bl" onclick="window.innerWidth<=1100?toggleMob('left'):togPanel('left')">☰ Stations</button>
      <button class="tbtn" id="bb" onclick="togBot()">📊 Charts</button>
      <button class="tbtn on" id="br" onclick="window.innerWidth<=1100?toggleMob('right'):togPanel('right')">▤ Data</button>
    </div>
    <div id="sel-indicator" style="display:none;font-size:.78rem;color:var(--neon);font-weight:700;white-space:nowrap;cursor:pointer" onclick="clearCC()"></div>
    <div class="nav-r">
      <div class="ns"><span class="dot" id="hd"></span> <b id="n_s">-</b> stn</div>
      <div class="ns">💨<b id="n_m">-</b></div>
      <div class="ns">🌊<b id="n_h">-</b></div>
    </div>
  </nav>

  <div class="ccbar" id="ccbar"></div>

  <aside class="left" id="pl">
    <div class="lhead"><input id="search" placeholder="Search MMSI / name / country..." oninput="filterList()"></div>
    <div class="slist" id="slist"></div>
    <div class="sdet" id="sdet"></div>
  </aside>

  <main class="mw">
    <div class="layer-sw" id="lsw"></div>
    <div id="map"></div>
  </main>

  <aside class="right" id="pr">
    <div class="rtabs">
      <div class="rtab on" data-t="meteo" onclick="rTab('meteo')">💨 Meteo</div>
      <div class="rtab" data-t="hydro" onclick="rTab('hydro')">🌊 Hydro</div>
    </div>
    <div class="trpick" id="rtime">
      <button class="trbtn on" onclick="setRange('1h')">1H</button>
      <button class="trbtn" onclick="setRange('6h')">6H</button>
      <button class="trbtn" onclick="setRange('24h')">24H</button>
      <button class="trbtn" onclick="setRange('7d')">7D</button>
      <button class="trbtn" onclick="setRange('30d')">30D</button>
      <button class="trbtn" onclick="setRange('all')">All</button>
    </div>
    <div class="rcontent" id="rc"></div>
    <div class="export-bar">
      <button class="ebtn" onclick="exportData('csv')">⬇ CSV</button>
      <button class="ebtn" onclick="exportData('json')">⬇ JSON</button>
      <span class="einfo" id="einfo"></span>
    </div>
  </aside>

  <div class="mob-overlay" id="mob-overlay" onclick="closeMob()"></div>

  <section class="bot" id="pbot">
    <div class="bhandle" id="bhandle"></div>
    <div class="bhead">
      <div class="tb">
        <button class="tbtn on" data-b="charts" onclick="bTab('charts')">📊 Charts</button>
        <button class="tbtn" data-b="forecast" onclick="bTab('forecast')">🔮 Forecast</button>
        <button class="tbtn" data-b="sys" onclick="bTab('sys')">⚙ System</button>
      </div>
      <div class="tb" id="sub-tabs" style="margin-left:8px"></div>
      <button class="bclose" onclick="togBot()">✕</button>
    </div>
    <div class="bbody" id="bbd"></div>
  </section>
</div>
<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
