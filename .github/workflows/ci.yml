name: CI/CD

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install fastapi uvicorn asyncpg httpx pydantic
      - name: Syntax check
        run: |
          cd app
          python -m py_compile config.py db.py main.py middleware.py models.py parser.py poller.py quality.py ws.py routes/api.py routes/pages.py

  build-and-push:
    name: Build & Push
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: tag
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          if [ "$BRANCH" = "main" ]; then TAG=latest
          elif [ "$BRANCH" = "staging" ]; then TAG=staging
          else TAG=dev; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Branch: $BRANCH → Tag: $TAG"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
